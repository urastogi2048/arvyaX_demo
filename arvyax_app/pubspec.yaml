name: arvyax_app
description: "ArvyaX - Immersive mindfulness sessions with nature ambiences."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  just_audio: ^0.10.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  simple_animations: ^5.2.0
  flutter_screenutil: ^5.9.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/data/ambiences.json
    - assets/images/
    - assets/audio/
